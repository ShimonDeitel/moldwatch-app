name: Moldwatch
options:
  bundleIdPrefix: com.shimondeitel.moldwatch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Moldwatch:
    type: application
    platform: iOS
    sources:
      - path: Moldwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.moldwatch
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Moldwatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  MoldwatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MoldwatchTests
      - path: Moldwatch.storekit
    dependencies:
      - target: Moldwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.moldwatch.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  MoldwatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MoldwatchUITests
    dependencies:
      - target: Moldwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.moldwatch.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Moldwatch:
    build:
      targets:
        Moldwatch: all
        MoldwatchTests: [test]
        MoldwatchUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Moldwatch.storekit
    test:
      config: Debug
      storeKitConfiguration: Moldwatch.storekit
      targets:
        - MoldwatchTests
        - MoldwatchUITests
    archive:
      config: Release
